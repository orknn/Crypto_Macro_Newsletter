name: Weekly Bulletin

on:
  schedule:
    # Every Sunday at 16:00 UTC
    - cron: '0 16 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout newsletter repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium --with-deps

      - name: Generate weekly bulletin & send
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.WEBSITE_PUSH_TOKEN }}
          SEND_EMAIL: "true"
          CI: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python main.py --edition weekly --send-email

      - name: Push to website repository
        env:
          WEBSITE_PUSH_TOKEN: ${{ secrets.WEBSITE_PUSH_TOKEN }}
        run: |
          # 1. Clone website repo
          git clone https://x-token-auth:${WEBSITE_PUSH_TOKEN}@github.com/orknn/nocashflow.net.git website
          
          # 2. Get ISO week number and today's date
          WEEK=$(date +%Y-W%V)
          TODAY=$(date +%Y-%m-%d)
          echo "Processing weekly bulletin for week: $WEEK (today: $TODAY)"
          
          # 3. Create target directory
          mkdir -p website/bulletins/weekly
          
          # 4. Copy latest files
          cp weekly_bulletin_tr.html website/bulletins/weekly/latest.tr.html
          cp weekly_bulletin_en.html website/bulletins/weekly/latest.en.html
          
          # 5. Copy dated/weekly files
          cp weekly_bulletin_tr.html website/bulletins/weekly/${WEEK}.tr.html
          cp weekly_bulletin_en.html website/bulletins/weekly/${WEEK}.en.html
          
          # 6. Apply hreflang alternate URL replacements for weekly files
          # tr file alternate link points to weekly en file
          sed -i "s|/bulletins/weekly/latest.en.html|/bulletins/weekly/${WEEK}.en.html|g" website/bulletins/weekly/${WEEK}.tr.html
          # en file alternate link points to weekly tr file
          sed -i "s|/bulletins/weekly/latest.tr.html|/bulletins/weekly/${WEEK}.tr.html|g" website/bulletins/weekly/${WEEK}.en.html
          
          # 7. Commit & Push
          cd website
          git config user.name "nocashflow-bulletin-bot"
          git config user.email "bot@nocashflow.net"
          git add bulletins/weekly/
          
          # Check changes and commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "bulletin: weekly ${TODAY}"
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: Upload weekly bulletin as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-bulletin-${{ github.run_number }}
          path: |
            weekly_bulletin_tr.html
            weekly_bulletin_en.html
            weekly_bulletin_tr.pdf
            weekly_bulletin_en.pdf
          retention-days: 30
