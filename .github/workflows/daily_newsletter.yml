name: Daily Newsletter

on:
  schedule:
    # Yaz saati (CEST, UTC+2): UTC 06:00 = İspanya 08:00
    - cron: '0 6 * * *'
    # Kış saati (CET, UTC+1): UTC 07:00 = İspanya 08:00
    - cron: '0 7 * * *'
  workflow_dispatch:  # Manual trigger

# Aynı gün içinde mükerrer çalışmayı engelle
concurrency:
  group: daily-newsletter-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check if already sent today
        if: github.event_name == 'schedule'
        id: dedup
        run: |
          echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Generate newsletter
        run: python main.py
        env:
          CI: 'true'

      - name: Send newsletter email
        if: success()
        run: python email_sender.py
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Upload newsletter artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_number }}
          path: |
            daily_bulletin.html
            daily_bulletin.pdf
            *.png
          retention-days: 7
